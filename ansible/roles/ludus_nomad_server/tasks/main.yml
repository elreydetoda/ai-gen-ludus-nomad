- name: Install shared server certificate
  ansible.builtin.copy:
    src: "{{ nomad_local_artifacts_dir }}/nomad-server.pem"
    dest: "{{ nomad_tls_dir }}/nomad-agent.pem"
    owner: "{{ nomad_user }}"
    group: "{{ nomad_group }}"
    mode: "0644"

- name: Install shared server key
  ansible.builtin.copy:
    src: "{{ nomad_local_artifacts_dir }}/nomad-server-key.pem"
    dest: "{{ nomad_tls_dir }}/nomad-agent-key.pem"
    owner: "{{ nomad_user }}"
    group: "{{ nomad_group }}"
    mode: "0640"

- name: Render Nomad server configuration
  ansible.builtin.template:
    src: server.hcl.j2
    dest: "{{ nomad_config_dir }}/nomad.hcl"
    owner: root
    group: "{{ nomad_group }}"
    mode: "0640"

- name: Restart Nomad server with the rendered configuration
  block:
    - name: Restart and enable the Nomad server service
      ansible.builtin.systemd:
        name: nomad
        enabled: true
        state: restarted
  rescue:
    - name: Capture Nomad service status after failed restart
      ansible.builtin.command: systemctl status nomad --no-pager --full
      register: nomad_restart_systemctl_status
      changed_when: false
      failed_when: false

    - name: Capture recent Nomad journal entries after failed restart
      ansible.builtin.command: journalctl -u nomad --no-pager -n 100
      register: nomad_restart_journalctl_status
      changed_when: false
      failed_when: false

    - name: Fail with Nomad restart diagnostics
      ansible.builtin.fail:
        msg: |
          Nomad service failed to restart after rendering the server configuration.

          systemctl status nomad --no-pager --full
          {{ nomad_restart_systemctl_status.stdout | default('') }}
          {{ nomad_restart_systemctl_status.stderr | default('') }}

          journalctl -u nomad --no-pager -n 100
          {{ nomad_restart_journalctl_status.stdout | default('') }}
          {{ nomad_restart_journalctl_status.stderr | default('') }}

- name: Wait for the Nomad server API to answer locally
  block:
    - name: Wait for the Nomad server listener to bind locally
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 4646
        delay: 1
        timeout: 10
      register: nomad_server_api_status
      retries: 20
      delay: 10
      until: nomad_server_api_status is succeeded
  rescue:
    - name: Capture Nomad service status after failed API probe
      ansible.builtin.command: systemctl status nomad --no-pager --full
      register: nomad_systemctl_status
      changed_when: false
      failed_when: false

    - name: Capture recent Nomad journal entries after failed API probe
      ansible.builtin.command: journalctl -u nomad --no-pager -n 100
      register: nomad_journalctl_status
      changed_when: false
      failed_when: false

    - name: Fail with Nomad startup diagnostics
      ansible.builtin.fail:
        msg: |
          Nomad server listener did not bind on 127.0.0.1:4646

          systemctl status nomad --no-pager --full
          {{ nomad_systemctl_status.stdout | default('') }}
          {{ nomad_systemctl_status.stderr | default('') }}

          journalctl -u nomad --no-pager -n 100
          {{ nomad_journalctl_status.stdout | default('') }}
          {{ nomad_journalctl_status.stderr | default('') }}

- name: Bootstrap ACL system
  ansible.builtin.command: nomad acl bootstrap -json
  environment:
    NOMAD_ADDR: https://127.0.0.1:4646
    NOMAD_CACERT: "{{ nomad_tls_dir }}/nomad-ca.pem"
    NOMAD_CLIENT_CERT: "{{ nomad_tls_dir }}/nomad-cli.pem"
    NOMAD_CLIENT_KEY: "{{ nomad_tls_dir }}/nomad-cli-key.pem"
    NOMAD_TLS_SERVER_NAME: "{{ nomad_server_cert_name }}"
  register: nomad_acl_bootstrap
  retries: "{{ nomad_bootstrap_wait_retries }}"
  delay: "{{ nomad_bootstrap_wait_delay }}"
  until: nomad_acl_bootstrap.rc == 0
  failed_when: false
  changed_when: nomad_acl_bootstrap.rc == 0
  when: inventory_hostname in groups["nomad_bootstrap"]
  args:
    creates: "{{ nomad_config_dir }}/bootstrap.token"

- name: Persist ACL bootstrap token
  ansible.builtin.copy:
    content: "{{ (nomad_acl_bootstrap.stdout | from_json).SecretID }}\n"
    dest: "{{ nomad_config_dir }}/bootstrap.token"
    owner: root
    group: "{{ nomad_group }}"
    mode: "0640"
  when:
    - inventory_hostname in groups["nomad_bootstrap"]
    - nomad_acl_bootstrap is changed

- name: Read persisted ACL bootstrap token
  ansible.builtin.slurp:
    src: "{{ nomad_config_dir }}/bootstrap.token"
  register: nomad_bootstrap_token_file
  when: inventory_hostname in groups["nomad_bootstrap"]

- name: Publish ACL bootstrap token as a fact
  ansible.builtin.set_fact:
    nomad_bootstrap_token: "{{ nomad_bootstrap_token_file.content | b64decode | trim }}"
  when: inventory_hostname in groups["nomad_bootstrap"]

- name: Render demo Nomad job file
  ansible.builtin.template:
    src: hello-world.nomad.hcl.j2
    dest: "{{ nomad_config_dir }}/{{ nomad_demo_job_name }}.nomad"
    owner: root
    group: root
    mode: "0644"
  when:
    - inventory_hostname in groups["nomad_bootstrap"]
    - nomad_deploy_demo_job | bool

- name: Wait for at least one Nomad client before demo submission
  ansible.builtin.command: nomad node status
  environment:
    NOMAD_ADDR: https://127.0.0.1:4646
    NOMAD_CACERT: "{{ nomad_tls_dir }}/nomad-ca.pem"
    NOMAD_CLIENT_CERT: "{{ nomad_tls_dir }}/nomad-cli.pem"
    NOMAD_CLIENT_KEY: "{{ nomad_tls_dir }}/nomad-cli-key.pem"
    NOMAD_TLS_SERVER_NAME: "{{ nomad_server_cert_name }}"
    NOMAD_TOKEN: "{{ nomad_bootstrap_token }}"
  register: nomad_client_status
  retries: 20
  delay: 10
  until: nomad_client_status.rc == 0 and ('ready' in nomad_client_status.stdout or 'eligible' in nomad_client_status.stdout)
  when:
    - inventory_hostname in groups["nomad_bootstrap"]
    - nomad_deploy_demo_job | bool

- name: Submit demo Nomad job
  ansible.builtin.command: nomad job run {{ nomad_config_dir }}/{{ nomad_demo_job_name }}.nomad
  environment:
    NOMAD_ADDR: https://127.0.0.1:4646
    NOMAD_CACERT: "{{ nomad_tls_dir }}/nomad-ca.pem"
    NOMAD_CLIENT_CERT: "{{ nomad_tls_dir }}/nomad-cli.pem"
    NOMAD_CLIENT_KEY: "{{ nomad_tls_dir }}/nomad-cli-key.pem"
    NOMAD_TLS_SERVER_NAME: "{{ nomad_server_cert_name }}"
    NOMAD_TOKEN: "{{ nomad_bootstrap_token }}"
  register: nomad_demo_job_run
  changed_when: "'Evaluation ID' in nomad_demo_job_run.stdout"
  when:
    - inventory_hostname in groups["nomad_bootstrap"]
    - nomad_deploy_demo_job | bool
